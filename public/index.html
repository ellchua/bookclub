<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Club Wheel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>Spilling the Tea Book Club</h1>
      <div class="slot-machine">
        <div id="light-frame" class="light-frame">
          <div class="slot-window">
            <div id="slot-reel" class="slot-reel">
              <div class="slot-item">
                <div id="slot-title" class="slot-title">Load books to roll</div>
                <div id="slot-author" class="slot-author"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="lever-wrap">
          <div class="lever-track">
            <div id="lever-handle" class="lever-handle" title="Pull to roll"></div>
          </div>
        </div>
      </div>
      <p id="winner" class="winner"></p>
      <button id="refresh-books" class="ghost">Refresh Books</button>

      <p id="status" class="status"></p>
    </main>

    <canvas id="confetti-canvas"></canvas>
    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <div id="modal-content"></div>
        <div class="modal-actions">
          <button id="modal-yes">Yes</button>
          <button id="modal-no" class="secondary">No</button>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
