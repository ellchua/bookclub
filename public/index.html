<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Club Wheel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>Book Club Control Panel</h1>
      <p class="subtitle">Pick the next book and organize meetings.</p>

      <section class="card">
        <h2>Book Roller</h2>
        <p>Pull the lever to roll unread books from Notion.</p>
        <div class="slot-machine">
          <div id="light-frame" class="light-frame">
            <div class="slot-window">
              <div id="slot-reel" class="slot-reel">
                <div class="slot-item">
                  <div id="slot-title" class="slot-title">Load books to roll</div>
                  <div id="slot-author" class="slot-author"></div>
                </div>
                <div class="slot-item">
                  <div id="slot-title-next" class="slot-title">Load books to roll</div>
                  <div id="slot-author-next" class="slot-author"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="lever-wrap">
            <div class="lever-track">
              <div id="lever-handle" class="lever-handle" title="Pull to roll"></div>
            </div>
          </div>
        </div>
        <p id="winner" class="winner"></p>
        <button id="refresh-books">Refresh Notion Books</button>
        <ul id="book-list"></ul>
      </section>

      <section class="card">
        <h2>Meeting Organizer + Invite</h2>
        <p id="current-host"></p>
        <button id="skip-host">Skip Current Host</button>
        <p id="members-loaded"></p>
        <ul id="host-order"></ul>
        <form id="invite-form">
          <input id="invite-to" placeholder="Emails (comma-separated)" required />
          <input id="invite-event-name" placeholder="Event name" value="Book Club Meeting" />
          <input id="invite-location" placeholder="Location" value="TBD" />
          <textarea id="invite-description" placeholder="Description"></textarea>
          <label>Date</label>
          <input id="invite-date" type="datetime-local" required />
          <button type="submit">Send Invite</button>
        </form>
      </section>

      <p id="status" class="status"></p>
    </main>

    <canvas id="confetti-canvas"></canvas>
    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <p id="modal-text"></p>
        <div class="modal-actions">
          <button id="modal-yes">Yes</button>
          <button id="modal-no" class="secondary">No</button>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
